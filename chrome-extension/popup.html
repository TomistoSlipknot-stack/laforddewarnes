<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 320px; font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; padding: 16px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .logo { width: 36px; height: 36px; background: #003478; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-size: 10px; font-style: italic; font-family: Georgia, serif; }
    .title { font-size: 14px; font-weight: 700; }
    .subtitle { font-size: 11px; color: #8b949e; }
    .supplier { display: flex; align-items: center; gap: 8px; padding: 10px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.gray { background: #555; }
    .sup-name { font-size: 13px; font-weight: 600; flex: 1; }
    .sup-status { font-size: 11px; color: #8b949e; }
    .login-btn { font-size: 10px; padding: 4px 10px; border: 1px solid #30363d; border-radius: 6px; background: transparent; color: #4a9eff; cursor: pointer; }
    .info { font-size: 11px; color: #8b949e; margin-top: 12px; line-height: 1.5; padding: 10px; background: #161b22; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Ford</div>
    <div>
      <div class="title">Stock Checker</div>
      <div class="subtitle">La Ford de Warnes</div>
    </div>
  </div>

  <div id="suppliers"></div>

  <div class="info">
    <strong>Cómo funciona:</strong><br>
    1. Iniciá sesión en cada proveedor (una vez)<br>
    2. Buscá una pieza en laforddewarnes.com → Proveedores<br>
    3. La extensión busca automáticamente en los 4 proveedores
  </div>

  <script src="popup.js"></script>
</body>
</html>
